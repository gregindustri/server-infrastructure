meta:
  version: PLCN_v3
  update_url: 'https://raw.githubusercontent.com/gregindustri/server-infrastructure/refs/heads/main/installer/dist/egg.yml'
exported_at: '2025-12-09T21:55:23+00:00'
name: 'GTNH'
author: 276266843+ortanfields@users.noreply.github.com
uuid: c38dc877-af0a-4dd1-bbec-3876a727be53
description: |-
  GTNH Script
image: '__ICON_DATA_URI__'
tags:
  - minecraft
features:
  - eula
  - java_version
  - pid_limit
docker_images:
  'Java 21': 'ghcr.io/pelican-eggs/yolks:java_21'
file_denylist: {  }
startup_commands:
  Default: './setup.sh && java -Xms6G -XX:MaxRAMPercentage=95.0 -Dterminal.jline=false -Dterminal.ansi=true -Dfml.readTimeout=300 @java9args.txt -jar Crucible-server.jar nogui'
config:
  files:
    server.properties:
      parser: properties
      find:
        server-ip: ''
        server-port: '{{server.allocations.default.port}}'
        query.port: '{{server.allocations.default.port}}'
  startup:
    done: ')! For help, type '
  logs: {  }
  stop: stop
scripts:
  installation:
    script: |-
      __INSTALLATION_SCRIPT__
    container: 'ghcr.io/pelican-eggs/installers:java_21'
    entrypoint: bash
variables:
  -
    name: 'GTNH Version'
    description: 'The GTNH version to download.'
    env_variable: GTNH_VERSION
    default_value: 2.8.4
    user_viewable: true
    user_editable: true
    rules:
      - nullable
      - string
    sort: 1
  -
    name: 'Crucible Tag'
    description: 'The crucible release tag.'
    env_variable: CRUCIBLE_TAG
    default_value: latest
    user_viewable: true
    user_editable: true
    rules:
      - nullable
      - string
    sort: 2
  -
    name: 'Server Codename'
    description: 'The codename to pull configuration for.'
    env_variable: SERVER_CODENAME
    default_value: testing
    user_viewable: true
    user_editable: true
    rules:
      - nullable
      - string
    sort: 3
  -
    name: 'Server Directory'
    description: 'Where setup.sh writes the server tree relative to the persistent volume. The egg expects the Crucible jar at the volume root, so this must be ".". Hidden from the user.'
    env_variable: SERVER_DIR
    default_value: '.'
    user_viewable: false
    user_editable: false
    rules:
      - required
      - string
    sort: 4
